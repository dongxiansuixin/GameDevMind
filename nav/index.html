<title>GameDevMind · 交互式导航</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --accent: #58a6ff;
  --red: #f85149;
  --orange: #d2991d;
  --yellow: #e3b341;
  --green: #3fb950;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.6; min-height:100vh; }
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:20px 24px; position:sticky; top:0; z-index:100; }
.header h1 { font-size:1.4rem; display:flex; align-items:center; gap:8px; }
.header h1 span { color:var(--accent); }
.header .subtitle { color:var(--muted); font-size:.85rem; margin-top:4px; }
.container { max-width:1200px; margin:0 auto; padding:20px 24px; }
.controls { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; align-items:center; }
.search-box { flex:1; min-width:200px; position:relative; }
.search-box input { width:100%; padding:10px 16px 10px 38px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); font-size:.9rem; outline:none; transition:border-color .2s; }
.search-box input:focus { border-color:var(--accent); }
.search-box::before { content:'🔍'; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:.8rem; }
.filters { display:flex; gap:8px; flex-wrap:wrap; }
.filter-group { display:flex; gap:4px; align-items:center; }
.filter-group .label { color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
.chip { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:.8rem; cursor:pointer; transition:all .2s; white-space:nowrap; user-select:none; }
.chip:hover { border-color:var(--accent); color:var(--text); }
.chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.category-tabs { display:flex; gap:4px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
.cat-tab { padding:8px 18px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:.82rem; cursor:pointer; transition:all .2s; white-space:nowrap; }
.cat-tab:hover { border-color:var(--accent); color:var(--text); }
.cat-tab.active { border-color:var(--accent); color:var(--accent); font-weight:600; }
.cat-tab .count { font-size:.7rem; margin-left:4px; opacity:.6; }
.stats { color:var(--muted); font-size:.8rem; margin-bottom:16px; }
.doc-list { display:grid; gap:8px; }
.doc-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; transition:border-color .2s,transform .15s; cursor:pointer; display:flex; align-items:center; gap:14px; }
.doc-card:hover { border-color:var(--accent); transform:translateX(3px); }
.doc-card .num { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; }
.doc-card .info { flex:1; min-width:0; }
.doc-card .title { font-weight:600; font-size:.9rem; color:var(--accent); }
.doc-card .path { font-size:.75rem; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.doc-card .tags { display:flex; gap:4px; flex-shrink:0; flex-wrap:wrap; }
.doc-card .tag { font-size:.65rem; padding:2px 8px; border-radius:10px; border:1px solid var(--border); white-space:nowrap; }
.tag-l1 { color:var(--green); border-color:var(--green); }
.tag-l2 { color:var(--yellow); border-color:var(--yellow); }
.tag-l3 { color:var(--red); border-color:var(--red); }
.tag-role { color:var(--purple); border-color:var(--purple); }
.c1 { background:#1a3a2a; color:var(--green); } /* 基础 */
.c2 { background:#2a1f0a; color:var(--orange); } /* 技术 */
.c3 { background:#2a2a0a; color:var(--yellow); } /* 研发 */
.c4 { background:#1a2a1a; color:#7ee787; } /* 生产 */
.c5 { background:#0a1a2a; color:var(--blue); } /* 管理 */
.c6 { background:#1a0a2a; color:var(--purple); } /* 运营 */
.empty { text-align:center; padding:48px; color:var(--muted); }
.paths-section { margin-top:32px; }
.paths-section h2 { font-size:1.1rem; margin-bottom:16px; color:var(--text); }
.path-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; }
.path-card h3 { font-size:.9rem; color:var(--accent); margin-bottom:8px; }
.path-flow { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.path-step { padding:4px 12px; border-radius:12px; font-size:.78rem; font-weight:600; }
.path-arrow { color:var(--muted); font-size:.8rem; }
.code-link { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:12px; background:rgba(88,166,255,.1); color:var(--accent); font-size:.72rem; text-decoration:none; }
.code-link:hover { background:rgba(88,166,255,.2); }
@media (max-width:768px) {
  .doc-card .tags { display:none; }
  .controls { flex-direction:column; }
  .search-box { width:100%; }
}
</style>

<div class="header">

    </div>
  </div>
  <div class="category-tabs" id="tabs"></div>

  <div class="paths-section">

</div>

const LEVELS=['','初级','中级','高级'];
const ROLES=['客户端','服务端'];

let activeCat=0, activeLevels=new Set(), activeRoles=new Set(), search='';

function toggleFilter(type,val,el){
  const s=type==='level'?activeLevels:activeRoles;
  s.has(val)?s.delete(val):s.add(val);
  el.classList.toggle('active',s.has(val));
  render();
}

function render(){
  // Tabs
  let tabsHtml='';
  for(let i=0;i<CATS.length;i++){
    const cnt=DOCS.filter(d=>d.c===i+1).length;
    tabsHtml+=`<span class="cat-tab ${i===activeCat?'active':''}" onclick="activeCat=${i};render()">${CATS[i]}<span class="count">${cnt}</span></span>`;
  }
  document.getElementById('tabs').innerHTML=tabsHtml;

  // Filter
  search=document.getElementById('search').value.toLowerCase();
  let filtered=DOCS.filter(d=>{
    if(activeCat>0&&d.c!==activeCat+1)return false;
    if(search&&!d.t.toLowerCase().includes(search))return false;
    if(activeLevels.size>0&&!activeLevels.has(LEVELS[d.l]))return false;
    if(activeRoles.size>0){
      const dr=d.r.split(',').map(s=>s.trim());
      if(![...activeRoles].some(r=>dr.includes(r)))return false;
    }
    return true;
  });

  document.getElementById('stats').textContent=`显示 ${filtered.length} / ${DOCS.length} 篇文档${search?` (搜索: "${search}")`:''}`;

  // List
  if(filtered.length===0){
    document.getElementById('list').innerHTML='<div class="empty">没有匹配的文档 😕</div>';
  }else{
    document.getElementById('list').innerHTML=filtered.map((d,i)=>{
      const lvlTag=d.l?`<span class="tag tag-l${d.l}">${LEVELS[d.l]}</span>`:'';
      const roleTags=d.r?d.r.split(',').map(r=>`<span class="tag tag-role">${r.trim()}</span>`).join(''):'';
      const codeLink=d.code?`<a class="code-link" href="../${d.code}">📦 代码</a>`:'';
      return `<a class="doc-card" href="../${d.p}">
        <div class="num ${CAT_CLASS[d.c-1]}">${d.c}.${String(i+1).padStart(2,'0')}</div>
        <div class="info">
          <div class="title">${d.t}</div>
          <div class="path">${d.p}</div>
        </div>
        <div class="tags">${lvlTag}${roleTags}${codeLink}</div>
      </a>`;
    }).join('');
  }

  // Paths
  document.getElementById('paths').innerHTML=`
    <div class="path-card">
      <h3>🎓 游戏开发新人路径</h3>
      <div class="path-flow">
        <span class="path-step c1">基础能力</span><span class="path-arrow">→</span>
        <span class="path-step c3">客户端/服务端研发</span><span class="path-arrow">→</span>
        <span class="path-step c2">技术能力（引擎选择）</span><span class="path-arrow">→</span>
        <span class="path-step c4">生产能力</span>
      </div>
    </div>
    <div class="path-card">
      <h3>💻 客户端开发路径</h3>
      <div class="path-flow">
        <span class="path-step c1">编程语言+数据结构</span><span class="path-arrow">→</span>
        <span class="path-step c2">图形渲染+引擎</span><span class="path-arrow">→</span>
        <span class="path-step c3">客户端架构+优化</span><span class="path-arrow">→</span>
        <span class="path-step c4">工具开发</span>
      </div>
    </div>
    <div class="path-card">
      <h3>🖥️ 服务端开发路径</h3>
      <div class="path-flow">
        <span class="path-step c1">网络+操作系统</span><span class="path-arrow">→</span>
        <span class="path-step c2">网络通信+数据库</span><span class="path-arrow">→</span>
        <span class="path-step c3">服务端架构+网络同步</span><span class="path-arrow">→</span>
        <span class="path-step c6">运维+运营</span>
      </div>
    </div>
    <div class="path-card">
      <h3>👔 技术管理路径</h3>
      <div class="path-flow">
        <span class="path-step c5">工作流+质量保障</span><span class="path-arrow">→</span>
        <span class="path-step c5">项目管理+SCRUM</span><span class="path-arrow">→</span>
        <span class="path-step c5">团队管理+组织</span><span class="path-arrow">→</span>
        <span class="path-step c6">产品运营</span>
      </div>
    </div>
  `;
}
